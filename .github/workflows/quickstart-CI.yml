# Workflow derived from https://github.com/r-lib/actions/tree/master/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [analytDerivs, master]
  pull_request:
    branches: [analytDerivs, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      MAKEFLAGS: -j2
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gfortran
        shell: bash

      # Generate DESCRIPTION and autogenerated headers/files before installing dependencies
      - name: Prepare build files
        run: |
          sh ./util/prep cran install
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            rcmdcheck
            roxygen2
            pkgbuild

      # Optional: verifying roxygenize works and checking package
      - name: roxygenize
        run: |
          sh ./util/prep cran build
        shell: bash

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--resave-data","--no-manual")'

      - name: Show testthat output
        if: always()
        run: find check -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: ${{ runner.os }}-results
          path: check
